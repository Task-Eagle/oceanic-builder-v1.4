    // Standard default starter elements for a new project
    const STARTER_ELEMENTS = [
      {

        type: 'heading',
        content: 'Oceanic Canvas Live',
        styles: {
          fontSize: 'text-4xl font-black text-white tracking-tight',
          textColor: '#ffffff',

      {

        content: 'Drag components from the right sidebar panel directly onto this canvas, or click any element here to customize colors, dimensions, borders, and interaction actions live!',
        styles: {
          fontSize: 'text-sm text-slate-400 max-w-lg mx-auto',

    function App() {
      // Authentication States
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);

      // Workspace States
      const [elements, setElements] = useState(STARTER_ELEMENTS);
      const [selectedElementId, setSelectedElementId] = useState(null);
      const [canvasScale, setCanvasScale] = useState(100);
      const [isRightSidebarOpen, setIsRightSidebarOpen] = useState(true);
      const [editorMode, setEditorMode] = useState('edit'); // 'edit' or 'preview'
      
      // Collaboration & Multi-User State
      const [roomId, setRoomId] = useState('');
      const [activeRoom, setActiveRoom] = useState(null);
      const [chatMessages, setChatMessages] = useState([]);
      const [chatText, setChatText] = useState('');

      // Storage Lists & State
      const [savedDesigns, setSavedDesigns] = useState([]);
      const [savedTemplates, setSavedTemplates] = useState([]);
      const [currentDesignTitle, setCurrentDesignTitle] = useState('My Untitled Masterpiece');
      const [currentDesignId, setCurrentDesignId] = useState(null);
      const [showSaveDropdown, setShowSaveDropdown] = useState(false);
      
      // Toast notifications
      const [toasts, setToasts] = useState([]);

      // Monitor Drag state
      const [dragOverIndex, setDragOverIndex] = useState(null);

      // Track active state of Firebase Listeners
      const currentRoomRef = useRef(null);

      // Right panel sub-tabs ("palette" vs "ai_generator")
      const [rightSidebarTab, setRightSidebarTab] = useState('palette');

      // AI Gemini Generation State
      const [aiComponentPrompt, setAiComponentPrompt] = useState('');
      const [isGeneratingComponent, setIsGeneratingComponent] = useState(false);
      const [aiCopyTone, setAiCopyTone] = useState('catchy');
      const [aiCopyInstructions, setAiCopyInstructions] = useState('');
      const [isOptimizingCopy, setIsOptimizingCopy] = useState(false);

      // Show temporary custom toasts to avoid browser popups
      const showToast = (message, type = 'success') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => {
          setToasts(prev => prev.filter(t => t.id !== id));
        }, 4000);
      };

      // Watch Authentication State changes
      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
          setAuthLoading(false);
          if (currentUser) {
            showToast(`Welcome back, ${currentUser.displayName || 'Creator'}!`);
            loadUserData(currentUser.uid);
          }
        });
        return () => unsubscribe();
      }, []);

      // Load Saved Designs & Templates from Firebase RTDB
      const loadUserData = (userId) => {
        const designsRef = ref(db, `users/${userId}/designs`);
        onValue(designsRef, (snapshot) => {
          const data = snapshot.val();
          if (data) {
            const list = Object.keys(data).map(key => ({ id: key, ...data[key] }));
            setSavedDesigns(list);
          } else {
            setSavedDesigns([]);
          }
        });

        const templatesRef = ref(db, `users/${userId}/templates`);
        onValue(templatesRef, (snapshot) => {
          const data = snapshot.val();
          if (data) {
            const list = Object.keys(data).map(key => ({ id: key, ...data[key] }));
            setSavedTemplates(list);
          } else {
            setSavedTemplates([]);
          }
        });
      };

      // Handle Authentication Logins
      const loginWithGoogle = async () => {
        try {
          const result = await signInWithPopup(auth, provider);
          setUser(result.user);
        } catch (error) {
          showToast(error.message, 'error');
        }
      };

      const handleLogOut = async () => {
        try {
          await signOut(auth);
          setUser(null);
          setSavedDesigns([]);
          setSavedTemplates([]);
          showToast("Logged out successfully");
        } catch (error) {
          showToast(error.message, 'error');
        }
      };

      // Handle Realtime Collaborative Synchronization (Multi-user Room Mode)
      const joinCollaborationRoom = (idToJoin) => {
        const cleanedRoomId = idToJoin.trim().toLowerCase();
        if (!cleanedRoomId) {
          showToast("Please specify a valid Room Key", "error");
          return;
        }

        // Leave existing room listener if registered
        if (currentRoomRef.current) {
          currentRoomRef.current();
        }

        const roomRef = ref(db, `rooms/${cleanedRoomId}`);
        const unsubscribe = onValue(roomRef, (snapshot) => {
          const val = snapshot.val();
          if (val) {
            if (val.elements) {
              setElements(val.elements);
            }
            if (val.title) {
              setCurrentDesignTitle(val.title);
            }
          }
        });

        currentRoomRef.current = unsubscribe;
        setActiveRoom(cleanedRoomId);
        showToast(`Connected to Dynamic Collaboration Room: "${cleanedRoomId}"`);
      };

      const leaveCollaborationRoom = () => {
        if (currentRoomRef.current) {
          currentRoomRef.current();
          currentRoomRef.current = null;
        }
        setActiveRoom(null);
        showToast("Switched back to standalone offline sandbox");
      };

      // Keep Firebase Database synced if Room session is active
      const updateCanvasData = (newElements) => {
        setElements(newElements);
        if (activeRoom) {
          set(ref(db, `rooms/${activeRoom}/elements`), newElements);
          set(ref(db, `rooms/${activeRoom}/title`), currentDesignTitle);
        }
      };

      // Ephemeral Room Chat functionality (volatile local state stream, no DB persistence)
      const handleSendChat = (e) => {
        e.preventDefault();
        if (!chatText.trim()) return;

        const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const newMessage = {
          id: Date.now(),
          user: user?.displayName || 'Anonymous Explorer',
          avatar: user?.photoURL || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100&q=80',
          text: chatText,
          time: timestamp
        };

        // Broadcast to dynamic stream/BroadcastChannel if other tabs are active on system
        const bc = new BroadcastChannel(`chat_${activeRoom || 'sandbox'}`);
        bc.postMessage(newMessage);

        setChatMessages(prev => [...prev, newMessage]);
        setChatText('');
      };

      // Listen to channel messages from adjacent peers
      useEffect(() => {
        const channelName = `chat_${activeRoom || 'sandbox'}`;
        const bc = new BroadcastChannel(channelName);
        bc.onmessage = (event) => {
          setChatMessages(prev => [...prev, event.data]);
        };
        return () => {
          bc.close();
        };
      }, [activeRoom]);

      // Gemini Text Generation Call with Exponential Backoff
      const executeGeminiCall = async (prompt, systemInstruction = "") => {
        const apiKey = ""; // Injected dynamically at runtime
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        
        const payload = {
          contents: [{ parts: [{ text: prompt }] }]
        };
        if (systemInstruction) {
          payload.systemInstruction = { parts: [{ text: systemInstruction }] };
        }

        let delay = 1000;
        for (let attempt = 0; attempt < 5; attempt++) {
          try {
            const response = await fetch(url, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            });
            if (response.ok) {
              const data = await response.json();
              return data.candidates?.[0]?.content?.parts?.[0]?.text;
            }
          } catch (e) {
            // Silence console error logging as per rule
          }
          await new Promise(r => setTimeout(r, delay));
          delay *= 2;
        }
        throw new Error("AI service was unable to generate content after several attempts. Try again later.");
      };

      // Gemini Structured Component Generation utilizing responseSchema
      const executeGeminiStructuredCall = async (prompt, systemInstruction, schema) => {
        const apiKey = ""; // Injected dynamically at runtime
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        
        const payload = {
          contents: [{ parts: [{ text: prompt }] }],
          systemInstruction: { parts: [{ text: systemInstruction }] },
          generationConfig: {
            responseMimeType: "application/json",
            responseSchema: schema
          }
        };

        let delay = 1000;
        for (let attempt = 0; attempt < 5; attempt++) {
          try {
            const response = await fetch(url, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            });
            if (response.ok) {
              const data = await response.json();
              const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
              return JSON.parse(responseText);
            }
          } catch (e) {
            // Silence console logs
          }
          await new Promise(r => setTimeout(r, delay));
          delay *= 2;
        }
        throw new Error("Structured AI layout generation timed out.");
      };

      // Trigger Gemini-powered Copywriting Improver
      const handleOptimizeCopy = async (targetElement) => {
        if (!targetElement.content && !targetElement.title) {
          showToast("Selected element does not contain editable copy", "error");
          return;
        }
        setIsOptimizingCopy(true);
        const originalText = targetElement.content || targetElement.title || "";
        const systemPrompt = "You are a professional conversion-focused SaaS copywriter. Rewrite the user's provided copy to match their requested tone and instructions. Provide ONLY the rewritten text, with no preamble or wrapping quotes.";
        
        let instructions = `Rewrite this copy: "${originalText}". Tone target: ${aiCopyTone}.`;
        if (aiCopyInstructions.trim()) {
          instructions += ` Specific instructions: ${aiCopyInstructions.trim()}`;
        }

        try {
          const optimizedCopy = await executeGeminiCall(instructions, systemPrompt);
          if (optimizedCopy && optimizedCopy.trim()) {
            if (targetElement.content) {
              updateElementProperty(targetElement.id, 'content', optimizedCopy.trim());
            } else {
              updateElementProperty(targetElement.id, 'title', optimizedCopy.trim());
            }
            showToast("Copy optimized with Gemini ✨");
            setAiCopyInstructions('');
          }
        } catch (err) {
          showToast(err.message, "error");
        } finally {
          setIsOptimizingCopy(false);
        }
      };

      // Trigger Gemini-powered Magic Component Generator
      const handleGenerateMagicComponent = async () => {
        if (!aiComponentPrompt.trim()) {
          showToast("Please write a layout prompt", "error");
          return;
        }
        setIsGeneratingComponent(true);

        const systemPrompt = `You are a web UI design system generator for Oceanic, a WYSIWYG editor.
Create beautifully styled, responsive website elements using our Ocean Blue theme tokens.
Styling Token Guidelines:
- Primary colors: deep slate, midnight blue ('#0f172a', '#1e293b', '#131a2d') or transparent.
- Highlights: cyan/aquamarine shades ('#06b6d4', '#22d3ee', '#0ea5e9') or clean white ('#ffffff').
- Text colors: grey shades for body text ('#94a3b8', '#cbd5e1') and white for headings ('#ffffff').
- Sizes: fontSize must be Tailwind strings like: 'text-xs', 'text-sm font-semibold', 'text-base font-medium', 'text-xl font-bold', 'text-3xl font-extrabold tracking-tight', 'text-5xl font-black'.
- Margins: classes like 'mb-2', 'my-4', 'mt-6'. Padding: 'p-2', 'p-4', 'p-6', 'py-3 px-6'.
- Border Radius: 'rounded-none', 'rounded-lg', 'rounded-2xl', 'rounded-full'.
- Action types: 'none', 'alert', or 'link'. Action values can be alert messages or URL links.
Generate a valid array of layout elements that best fulfills the user's prompt. Make them visually stunning and highly modern. Ensure IDs are unique.`;

        const schema = {
          type: "OBJECT",
          properties: {
            elements: {
              type: "ARRAY",
              description: "Array of design components representing the requested layout block",
              items: {
                type: "OBJECT",
                properties: {
                  id: { type: "STRING", description: "Unique generated ID string starting with 'ai_'" },
                  type: { type: "STRING", description: "Must be heading, text, button, container, image, or card" },
                  content: { type: "STRING", description: "Text or inner content of the component" },
                  title: { type: "STRING", description: "Card title if element type is card" },
                  image: { type: "STRING", description: "Card image link if element type is card" },
                  src: { type: "STRING", description: "Image source link if element type is image" },
                  alt: { type: "STRING", description: "Alt label if element type is image" },
                  styles: {
                    type: "OBJECT",
                    properties: {
                      fontSize: { type: "STRING" },
                      textColor: { type: "STRING" },
                      textAlign: { type: "STRING" },
                      backgroundColor: { type: "STRING" },
                      padding: { type: "STRING" },
                      margin: { type: "STRING" },
                      borderRadius: { type: "STRING" }
                    }
                  },
                  action: {
                    type: "OBJECT",
                    properties: {
                      type: { type: "STRING" },
                      value: { type: "STRING" }
                    }
                  }
                },
                required: ["id", "type", "content", "styles"]
              }
            }
          },
          required: ["elements"]
        };

        try {
          const result = await executeGeminiStructuredCall(aiComponentPrompt, systemPrompt, schema);
          if (result && result.elements && result.elements.length > 0) {
            const updated = [...elements, ...result.elements];
            updateCanvasData(updated);
            showToast("Appended generated magic components ✨");
            setAiComponentPrompt('');
          } else {
            showToast("No elements returned. Refine your prompt.", "error");
          }
        } catch (err) {
          showToast(err.message, "error");
        } finally {
          setIsGeneratingComponent(false);
        }
      };

      // Element Template loaders
      const createDefaultElement = (type) => {
        const baseId = `elem_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`;
        switch (type) {
          case 'heading':
            return {
              id: baseId,
              type: 'heading',
              content: 'Elevate Digital Frontiers',
              styles: {
                fontSize: 'text-2xl font-bold',
                textColor: '#ffffff',
                textAlign: 'text-left',
                backgroundColor: 'transparent',
                padding: 'p-2',
                margin: 'my-2',
                borderRadius: 'rounded-none'
              }
            };
          case 'text':
            return {
              id: baseId,
              type: 'text',
              content: 'Craft user experiences that integrate seamless interactions with high-contrast color balances.',
              styles: {
                fontSize: 'text-base',
                textColor: '#94a3b8',
                textAlign: 'text-left',
                backgroundColor: 'transparent',
                padding: 'p-2',
                margin: 'my-2',
                borderRadius: 'rounded-none'
              }
            };
          case 'button':
            return {
              id: baseId,
              type: 'button',
              content: 'Get Consultation',
              styles: {
                fontSize: 'text-sm font-medium',
                textColor: '#ffffff',
                textAlign: 'text-center',
                backgroundColor: '#0ea5e9',
                padding: 'py-2 px-5',
                margin: 'my-2 block',
                borderRadius: 'rounded-lg'
              },
              action: {
                type: 'alert',
                value: 'Form submission system connected!'
              }
            };
          case 'container':
            return {
              id: baseId,
              type: 'container',
              content: 'Empty responsive containment frame. Drag secondary components into me.',
              styles: {
                fontSize: 'text-sm text-slate-400 italic',
                textColor: '#64748b',
                textAlign: 'text-center',
                backgroundColor: '#1e293b',
                padding: 'p-8',
                margin: 'my-4',
                borderRadius: 'rounded-xl'
              }
            };
          case 'image':
            return {
              id: baseId,
              type: 'image',
              src: 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=600&q=80',
              alt: 'Strategic Server Nodes',
              styles: {
                backgroundColor: 'transparent',
                padding: 'p-0',
                margin: 'my-4',
                borderRadius: 'rounded-lg'
              }
            };
          case 'card':
            return {
              id: baseId,
              type: 'card',
              title: 'Global Hosting Solutions',
              content: 'Deploy instantly across our high-performance Edge infrastructure with optimal latency response.',
              image: 'https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=400&q=80',
              styles: {
                backgroundColor: '#0f172a',
                textColor: '#f8fafc',
                padding: 'p-6',
                margin: 'my-4',
                borderRadius: 'rounded-2xl'
              }
            };
          default:
            return null;
        }
      };

      // HTML Drag and Drop Events
      const handleDragStart = (e, index, isPalette = false, paletteType = '') => {
        if (isPalette) {
          e.dataTransfer.setData("text/plain", `palette:${paletteType}`);
        } else {
          e.dataTransfer.setData("text/plain", `canvas:${index}`);
        }
      };

      const handleDragOver = (e, index) => {
        e.preventDefault();
        setDragOverIndex(index);
      };

      const handleDrop = (e, index) => {
        e.preventDefault();
        setDragOverIndex(null);
        const data = e.dataTransfer.getData("text/plain");

        if (!data) return;

        const [source, payload] = data.split(':');
        const updated = [...elements];

        if (source === 'palette') {
          const newEl = createDefaultElement(payload);
          if (newEl) {
            updated.splice(index, 0, newEl);
          }
        } else if (source === 'canvas') {
          const oldIndex = parseInt(payload, 10);
          const [movedEl] = updated.splice(oldIndex, 1);
          updated.splice(index, 0, movedEl);
        }

        updateCanvasData(updated);
      };

      // Direct item styling mutator inside canvas state array
      const updateElementProperty = (id, propName, value) => {
        const updated = elements.map(el => {
          if (el.id === id) {
            if (propName.startsWith('styles.')) {
              const styleKey = propName.split('.')[1];
              return {
                ...el,
                styles: {
                  ...el.styles,
                  [styleKey]: value
                }
              };
            } else if (propName.startsWith('action.')) {
              const actionKey = propName.split('.')[1];
              return {
                ...el,
                action: {
                  ...el.action,
                  [actionKey]: value
                }
              };
            } else {
              return {
                ...el,
                [propName]: value
              };
            }
          }
          return el;
        });
        updateCanvasData(updated);
      };

      const deleteElement = (id) => {
        const filtered = elements.filter(el => el.id !== id);
        updateCanvasData(filtered);
        setSelectedElementId(null);
        showToast("Component deleted");
      };

      const duplicateElement = (id) => {
        const index = elements.findIndex(el => el.id === id);
        if (index === -1) return;
        const source = elements[index];
        const clone = {
          ...JSON.parse(JSON.stringify(source)),
          id: `elem_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`
        };
        const updated = [...elements];
        updated.splice(index + 1, 0, clone);
        updateCanvasData(updated);
        showToast("Component duplicated");
      };

      // Save Workspace Design Logic
      const handleSaveDesign = async (isTemplate = false) => {
        if (!user) {
          showToast("Authentication required to save layouts!", "error");
          return;
        }

        const payload = {
          title: currentDesignTitle,
          elements: elements,
          updatedAt: Date.now()
        };

        const targetNode = isTemplate ? 'templates' : 'designs';
        
        try {
          if (currentDesignId && !isTemplate) {
            // Update existing design
            await set(ref(db, `users/${user.uid}/designs/${currentDesignId}`), payload);
            showToast(`"${currentDesignTitle}" saved successfully!`);
          } else {
            // Push new entry
            const newRef = push(ref(db, `users/${user.uid}/${targetNode}`));
            await set(newRef, payload);
            if (!isTemplate) {
              setCurrentDesignId(newRef.key);
            }
            showToast(`Saved as new ${isTemplate ? 'Template' : 'Design'} successfully!`);
          }
          setShowSaveDropdown(false);
        } catch (err) {
          showToast(`Error: ${err.message}`, "error");
        }
      };

      // Clear layout elements
      const handleNewCanvas = () => {
        setElements([]);
        setCurrentDesignId(null);
        setCurrentDesignTitle('My Untitled Masterpiece');
        setSelectedElementId(null);
        showToast("Canvas refreshed and cleared");
      };

      // Load specific document states from dashboard panels
      const loadSavedLayout = (item) => {
        setElements(item.elements || []);
        setCurrentDesignTitle(item.title);
        setCurrentDesignId(item.id);
        setSelectedElementId(null);
        showToast(`Loaded: "${item.title}"`);
      };

      // Compiles current elements to a standalone optimized Tailwind HTML file
      const handleExportHTML = () => {
        const renderElements = elements.map(el => {
          const inlineStyle = `
            background-color: ${el.styles.backgroundColor || 'transparent'};
            color: ${el.styles.textColor || 'inherit'};
          `;
          
          let classes = `${el.styles.padding || ''} ${el.styles.margin || ''} ${el.styles.borderRadius || ''} ${el.styles.textAlign || ''}`;
          
          if (el.type === 'heading') {
            const fontClass = el.styles.fontSize || 'text-3xl font-bold';
            return `<h1 class="${fontClass} ${classes}" style="${inlineStyle}">${el.content}</h1>`;
          }
          if (el.type === 'text') {
            const fontClass = el.styles.fontSize || 'text-base';
            return `<p class="${fontClass} ${classes}" style="${inlineStyle}">${el.content}</p>`;
          }
          if (el.type === 'button') {
            const actType = el.action?.type || '';
            const actVal = el.action?.value || '';
            return `<button data-action-type="${actType}" data-action-val="${actVal}" class="transition hover:opacity-90 inline-block ${classes}" style="${inlineStyle}">${el.content}</button>`;
          }
          if (el.type === 'container') {
            return `<div class="${classes}" style="${inlineStyle}">${el.content}</div>`;
          }
          if (el.type === 'image') {
            return `<img src="${el.src}" alt="${el.alt || ''}" class="max-w-full h-auto ${classes}" style="${inlineStyle}" />`;
          }
          if (el.type === 'card') {
            return `
              <div class="overflow-hidden ${classes}" style="${inlineStyle}">
                \${el.image ? \`<img src="\${el.image}" alt="Card Media" class="w-full h-48 object-cover mb-4" />\` : ''}
                <h3 class="text-xl font-bold mb-2">\text{el.title || ''}</h3>
                <p class="text-sm opacity-90">\text{el.content || ''}</p>
              </div>
            `;
          }
          return '';
        }).join('\n');

        // Hexadecimal escape sequences prevent the inline compilation from prematurely breaking the browser script block container.
        const htmlBlobContent = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${currentDesignTitle}</title>
  <!-- Tailwind CSS Engine -->
  \x3Cscript src="https://cdn.tailwindcss.com">\x3C/script>
  <style>
    body {
      background-color: #0b0f19;
      color: #f1f5f9;
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body class="min-h-screen p-8 flex flex-col items-center justify-center">
  <div class="max-w-4xl w-full mx-auto">
    ${renderElements}
  </div>

  \x3Cscript>
    // Dynamic Interaction actions compiled by Oceanic Editor
    document.querySelectorAll('[data-action-type="alert"]').forEach(btn => {
      btn.addEventListener('click', () => {
        alert(btn.getAttribute('data-action-val') || 'Alert triggered!');
      });
    });
    
    document.querySelectorAll('[data-action-type="link"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const dest = btn.getAttribute('data-action-val');
        if (dest) {
          window.open(dest, '_blank');
        }
      });
    });
  \x3C/script>
</body>
</html>`;

        const blob = new Blob([htmlBlobContent], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${currentDesignTitle.toLowerCase().replace(/\s+/g, '-') || 'index'}.html`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast("HTML Exported Successfully!");
      };

      // Retrieve currently selected element attributes
      const selectedElement = elements.find(el => el.id === selectedElementId);

      return (
        <div className="h-full flex flex-col bg-[#0b0f19] select-none text-slate-100">
          
          {/* Toast notifications container */}
          <div className="fixed top-4 right-4 z-50 flex flex-col gap-2">
            {toasts.map(t => (

                  <i className="fa-solid fa-compass-drafting text-slate-900 text-lg"></i>
                </div>
                <div className="hidden sm:block">
                  <span className="font-extrabold text-white text-lg tracking-wider block leading-none">OCEANIC</span>

                <i className="fa-solid fa-rotate-left"></i>
              </button>

              {/* Dynamic Collaboration Room Indicator */}
              {activeRoom && (
                <div className="flex items-center gap-2 bg-emerald-950/80 border border-emerald-800 text-emerald-400 px-3 py-1.5 rounded-lg text-xs font-semibold animate-pulse">

              {/* Save Design Multi-Dropdown */}

                <button

                  <i className="fa-solid fa-cloud-arrow-up"></i> Save Options <i className="fa-solid fa-chevron-down text-[10px]"></i>
                </button>

                {showSaveDropdown && (
                  <div className="absolute right-0 mt-2 w-48 rounded-xl bg-[#0f172a] border border-slate-800 shadow-2xl p-1 z-50 animate-fadeIn">
                    <button

              {/* Export HTML File Action */}
              <button

                <i className="fa-solid fa-file-export"></i> Export HTML

              {/* Authentication Status Header Segment */}
              <div className="flex items-center gap-2 border-l border-slate-800 pl-3">

                    <button

          {/* Main IDE 3-Column Interface Frame */}
          <div className="flex-1 flex overflow-hidden">
            
            {/* LEFT SIDEBAR: Dashboard, Templates, and Collaboration Chat */}

              <div className="p-4 space-y-6">

                          <button 
                            key={rad}
                            onClick={() => updateElementProperty(selectedElement.id, 'styles.borderRadius', rad)}
                            className={`py-1.5 rounded text-[10px] font-semibold transition truncate capitalize ${
                              selectedElement.styles.borderRadius === rad 
                                ? 'bg-cyan-500 text-slate-950' 
                                : 'bg-slate-950 text-slate-400 hover:text-slate-200 border border-slate-800'
                            }`}>
                            {rad.replace('rounded-', '')}
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* Click Interaction Configuration (Click Actions) */}
                    {selectedElement.type === 'button' && (
                      <div className="space-y-3 border-t border-slate-800/85 pt-4 bg-slate-950 p-3 rounded-xl border border-slate-800">
                        <label className="text-[10px] font-bold text-cyan-400 uppercase tracking-widest block">Action Configuration</label>
                        
                        <div className="space-y-1.5">
                          <label className="text-[9px] text-slate-400 font-bold">Action Type</label>
                          <select 
                            value={selectedElement.action?.type || 'none'}
                            onChange={(e) => updateElementProperty(selectedElement.id, 'action.type', e.target.value)}
                            className="w-full bg-slate-900 border border-slate-800 rounded-lg p-2 text-xs outline-none text-slate-200">
                            <option value="none">No Event Action</option>
                            <option value="alert">Alert Message Box</option>
                            <option value="link">Navigate to URL Link</option>
                          </select>
                        </div>

                        {selectedElement.action?.type !== 'none' && (
                          <div className="space-y-1.5">
                            <label className="text-[9px] text-slate-400 font-bold">
                              {selectedElement.action?.type === 'alert' ? 'Message Text' : 'Target URL'}
                            </label>
                            <input 
                              type="text" 
                              placeholder={selectedElement.action?.type === 'alert' ? 'e.g. Hello!' : 'e.g. https://google.com'}
                              value={selectedElement.action?.value || ''}
                              onChange={(e) => updateElementProperty(selectedElement.id, 'action.value', e.target.value)}
                              className="w-full bg-slate-900 border border-slate-800 rounded-lg p-2 text-xs outline-none text-slate-200"
                            />
                          </div>
                        )}
                      </div>
                    )}

                  </div>
                ) : (
                  
                  /* Default Side Panel: Toggleable Component Library vs Magic AI Generator */
                  <div className="p-5 flex flex-col h-full overflow-hidden">
                    
                    {/* Top sub-tabs */}
                    <div className="grid grid-cols-2 gap-1 bg-slate-950 p-1 rounded-xl border border-slate-850 shrink-0 mb-6">
                      <button 
                        onClick={() => setRightSidebarTab('palette')}
                        className={`py-1.5 rounded-lg text-xs font-bold transition flex items-center justify-center gap-1.5 ${
                          rightSidebarTab === 'palette' ? 'bg-ocean-700 text-white' : 'text-slate-400 hover:text-slate-200'
                        }`}>
                        <i className="fa-solid fa-shapes"></i> Standard
                      </button>
                      <button 
                        onClick={() => setRightSidebarTab('ai_generator')}
                        className={`py-1.5 rounded-lg text-xs font-bold transition flex items-center justify-center gap-1.5 ${
                          rightSidebarTab === 'ai_generator' ? 'bg-[#4c1d95] text-purple-100' : 'text-slate-400 hover:text-slate-200'
                        }`}>
                        <i className="fa-solid fa-wand-magic-sparkles text-purple-400"></i> AI Magic
                      </button>
                    </div>

                    {rightSidebarTab === 'palette' ? (
                      <div className="space-y-6 flex-1 overflow-y-auto pr-1">
                        <div className="pb-3 border-b border-slate-800 flex items-center gap-2">
                          <i className="fa-solid fa-shapes text-cyan-400"></i>
                          <h3 className="font-extrabold text-xs text-white uppercase tracking-wider">HTML Component Palette</h3>
                        </div>

                        <div className="grid grid-cols-1 gap-3">
                          {[
                            { type: 'heading', name: 'Heading Header (H1)', icon: 'fa-heading', desc: 'Pre-formatted visual headings for pages' },
                            { type: 'text', name: 'Rich Paragraph', icon: 'fa-align-left', desc: 'Standard body text block container' },
                            { type: 'button', name: 'Interactive Button', icon: 'fa-square', desc: 'Styled CTA with customizable actions' },
                            { type: 'container', name: 'Structure Div', icon: 'fa-vector-square', desc: 'Generic nested layout containment block' },
                            { type: 'image', name: 'Responsive Image', icon: 'fa-image', desc: 'Clean optimized external media element' },
                            { type: 'card', name: 'Content Card Block', icon: 'fa-id-card', desc: 'Modern card with media, title, & content' },
                          ].map(item => (
                            <div 
                              key={item.type}
                              draggable
                              onDragStart={(e) => handleDragStart(e, null, true, item.type)}
                              className="bg-slate-900/60 hover:bg-slate-800/80 border border-slate-800/80 hover:border-cyan-500/50 p-3 rounded-xl transition cursor-grab active:cursor-grabbing group">
                              <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-xl bg-slate-950 flex items-center justify-center text-cyan-400 group-hover:bg-ocean-900 group-hover:text-cyan-300 transition shrink-0">
                                  <i className={`fa-solid ${item.icon} text-lg`}></i>
                                </div>
                                <div className="overflow-hidden">
                                  <span className="text-xs font-bold block text-slate-200 group-hover:text-white truncate">{item.name}</span>
                                  <span className="text-[10px] text-slate-500 block truncate">{item.desc}</span>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>

                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800/60 text-center">
                          <p className="text-[11px] text-slate-400 leading-relaxed">
                            <i className="fa-solid fa-wand-magic-sparkles text-cyan-400 mr-1"></i>
                            <b>Drag and Drop:</b> Grab elements and place them on active canvas slots.
                          </p>
                        </div>
                      </div>
                    ) : (
                      /* ✨ AI Magic Generator Panel */
                      <div className="space-y-4 flex-1 overflow-y-auto pr-1">
                        <div className="pb-3 border-b border-slate-800 flex items-center gap-2">
                          <i className="fa-solid fa-wand-magic-sparkles text-purple-400"></i>
                          <h3 className="font-extrabold text-xs text-white uppercase tracking-wider">✨ Magic AI Generator</h3>
                        </div>

                        <div className="space-y-4">
                          <p className="text-[11px] text-slate-400 leading-relaxed">
                            Describe layout blocks you would like to automatically generate using professional Oceanic styling tokens.
                          </p>

                          <div className="space-y-1.5">
                            <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Describe elements / layout</label>
                            <textarea 
                              rows="5"
                              value={aiComponentPrompt}
                              onChange={(e) => setAiComponentPrompt(e.target.value)}
                              placeholder="e.g. A gorgeous three-tiered pricing table for an Enterprise Cloud Hosting SaaS business, with active center tier highlighted with glowing cyan borders..."
                              className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs outline-none focus:border-purple-500 text-slate-200 resize-none placeholder-slate-700 font-medium leading-relaxed"
                            />
                          </div>

                          <button 
                            onClick={handleGenerateMagicComponent}
                            disabled={isGeneratingComponent}
                            className="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 disabled:from-slate-800 disabled:to-slate-800 text-white font-extrabold text-xs py-2.5 rounded-xl flex items-center justify-center gap-2 transition shadow-lg shadow-purple-900/10">
                            {isGeneratingComponent ? (
                              <>
                                <div className="w-4 h-4 rounded-full border-2 border-white/20 border-t-white animate-spin"></div>
                                <span>Generating Magic Layout...</span>
                              </>
                            ) : (
                              <span>✨ Generate Layout with Gemini</span>
                            )}
                          </button>

                          <div className="p-3.5 bg-slate-950 rounded-xl border border-slate-900 space-y-2">
                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block">💡 Suggested Prompts:</span>
                            <ul className="text-[10px] text-slate-500 space-y-1.5 leading-relaxed">
                              <li className="cursor-pointer hover:text-cyan-400 transition" onClick={() => setAiComponentPrompt("A high-conversion CTA banner featuring an organic deep blue card, a big heading about quantum servers, and a cyan call to action button")}>• High conversion server CTA layout</li>
                              <li className="cursor-pointer hover:text-cyan-400 transition" onClick={() => setAiComponentPrompt("Three-tier pricing layout showcasing bronze, gold, and platinum cloud servers with glowing border outlines")}>• Three-tier server pricing tables</li>
                              <li className="cursor-pointer hover:text-cyan-400 transition" onClick={() => setAiComponentPrompt("Two customer testimonial blocks side-by-side with circular avatars and small cyan rating details")}>• Client review card blocks</li>
                            </ul>
                          </div>
                        </div>
                      </div>
                    )}

                  </div>

                )}

              </aside>
            )}

          </div>

          {/* Footer Ribbon to satisfy instructions constraints */}
          <footer className="h-6 bg-[#090d18] border-t border-slate-900 text-[10px] text-slate-500 px-4 flex items-center justify-between shrink-0">
            <span>Powered by Gemini &amp; Tailwind Engine</span>
            <span>Oceanic WYSIWYG Builder &copy; 2026</span>
          </footer>

        </div>
      );
    }

    // Mount Application inside system
    const rootElement = document.getElementById("root");
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
